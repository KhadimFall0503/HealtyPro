<!-- Section Services Preview (Même style que page services) -->
<section id="services" class="bg-gradient-to-b from-white to-gray-50 py-28">
  <div class="max-w-7xl mx-auto px-6 text-center">

    <!-- Titre -->
    <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-6">
      Nos <span class="text-yellow-400">Services</span>
    </h2>

    <p class="text-gray-600 text-lg md:text-xl mb-16 mx-auto max-w-2xl">
      Découvrez nos services médicaux spécialisés, conçus pour votre bien-être.
    </p>

    <!-- GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">

      {% for service in services %}
      <div class="group relative">

        <!-- CARD -->
        <div class="relative bg-white rounded-3xl shadow-xl overflow-hidden transition duration-500 hover:-translate-y-4 hover:shadow-2xl">

          <!-- IMAGE -->
          <div class="relative h-64 overflow-hidden">
            <img src="{{ service.image.url }}" 
                 alt="{{ service.nom }}"
                 class="w-full h-full object-cover transition duration-700 group-hover:scale-110">

            <!-- Overlay -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent"></div>

            <!-- Badge -->
            <span class="absolute top-4 left-4 bg-yellow-400 text-gray-900 text-xs font-bold px-4 py-1 rounded-full shadow-md">
              Service Premium
            </span>
          </div>

          <!-- CONTENT -->
          <div class="p-8 flex flex-col justify-between h-64">

            <div>
              <h3 class="text-2xl font-bold text-gray-900 mb-4 group-hover:text-yellow-500 transition">
                {{ service.nom }}
              </h3>

              <p class="text-gray-600 leading-relaxed mb-6">
                {{ service.description|truncatewords:15 }}
              </p>
            </div>

            <!-- BOUTON GRADIENT -->
            <a href="{% url 'service_detail' service.id %}"
               class="inline-flex items-center justify-between w-full px-6 py-3 
               bg-gradient-to-r from-teal-600 to-green-500 
               text-white font-semibold rounded-xl 
               shadow-lg transition duration-300 
               hover:scale-105 hover:shadow-xl">

              En savoir plus

              <span class="ml-2 transform transition duration-300 group-hover:translate-x-2">
                →
              </span>
            </a>

          </div>

        </div>

        <!-- Effet décoratif arrière -->
        <div class="absolute -bottom-4 left-6 w-20 h-20 bg-teal-300 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition"></div>

      </div>
      {% endfor %}

    </div>

    <!-- Bouton Voir Tous -->
    <div class="mt-16 flex justify-center">
      <a href="{% url 'services' %}" 
         class="inline-flex items-center px-10 py-4 
         bg-gradient-to-r from-teal-600 to-green-500 
         text-white font-bold rounded-full shadow-lg 
         hover:scale-105 hover:shadow-xl transition duration-300">
        Voir tous les services →
      </a>
    </div>

  </div>
</section>
